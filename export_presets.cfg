html/head_include="<link rel=\"manifest\" href=\"manifest.json\" />\n<meta name=\"description\" content=\"2.5D 像素风自动战斗挂机 RPG，自动打怪、收集装备、挑战 Boss。\" />\n<meta name=\"theme-color\" content=\"#242438\" />\n<script>if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(function(e){console.error('SW registration failed',e);});}</script>\n<style>\n#status { background: linear-gradient(135deg, #1a1a2e 0%, #242438 100%); }\n#status-splash { border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); max-width: 45%; }\n#status-progress {\n  width: 60%;\n  height: 8px;\n  border-radius: 4px;\n  background: rgba(255,255,255,0.1);\n  border: none;\n  overflow: hidden;\n}\n#status-progress::-webkit-progress-bar { background: rgba(255,255,255,0.1); border-radius: 4px; }\n#status-progress::-webkit-progress-value { background: linear-gradient(90deg, #4facfe, #00f2fe); border-radius: 4px; }\n#status-progress::-moz-progress-bar { background: linear-gradient(90deg, #4facfe, #00f2fe); border-radius: 4px; }\n#status::after {\n  content: \"正在加载像素挂机勇者...\";\n  position: absolute;\n  bottom: calc(10% + 24px);\n  left: 0; right: 0;\n  text-align: center;\n  color: rgba(255,255,255,0.85);\n  font-size: 16px;\n  letter-spacing: 2px;\n  pointer-events: none;\n}\n#status-notice { font-family: 'Noto Sans', 'Microsoft YaHei', Arial, sans-serif; }\n</style>\n<script>\n(function(){\n  window.__gameErrors = window.__gameErrors || [];\n  window.__gameErrorReportUrl = \"\";\n  function pushError(info){\n    window.__gameErrors.push(info);\n    if(window.__gameErrors.length > 50) window.__gameErrors.shift();\n    if(window.__gameErrorReportUrl && window.fetch){\n      fetch(window.__gameErrorReportUrl, {method:\"POST\", body:JSON.stringify(info), keepalive:true}).catch(function(){});\n    }\n  }\n  window.addEventListener(\"error\", function(e){\n    pushError({type:\"error\", message:e.message, file:e.filename, line:e.lineno, col:e.colno, stack:e.error && e.error.stack, time:Date.now()});\n  });\n  window.addEventListener(\"unhandledrejection\", function(e){\n    pushError({type:\"rejection\", message:String(e.reason), stack:e.reason && e.reason.stack, time:Date.now()});\n  });\n  window.onerror = function(msg, url, line, col, err){\n    pushError({type:\"onerror\", message:msg, file:url, line:line, col:col, stack:err && err.stack, time:Date.now()});\n    return false;\n  };\n})();\n</script>\n<script>\n(function(){\n  var canvas = document.getElementById('canvas');\n  if(canvas && !canvas.getContext('webgl') && !canvas.getContext('experimental-webgl')){\n    canvas.innerHTML = '<div style=\"color:#fff;text-align:center;padding:40px;font-family:Noto Sans,Microsoft YaHei,Arial,sans-serif;\">您的浏览器不支持 WebGL，无法运行像素挂机勇者。<br>请使用 Chrome、Edge 或 Firefox 的最新版本。</div>';\n  }\n})();\n</script>"
